<ion-header>
  <ion-toolbar>
    <ion-title>Login</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">

  <ion-item>
    <ion-input
      label="Usuario"
      [(ngModel)]="usuario">
    </ion-input>
  </ion-item>

  <ion-item>
    <ion-input
      label="Contraseña"
      type="password"
      [(ngModel)]="password">
    </ion-input>
  </ion-item>

  <ion-button
    expand="block"
    (click)="ingresar()">

    Ingresar

  </ion-button>

</ion-content>
